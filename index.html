<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Radar v2</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <h1>Campus Radar</h1>
                <span class="version-tag">PRO</span>
            </div>
            
            <div class="header-right">
                <button id="open-notepad-btn" class="notepad-btn">📌 Sabit Notlar</button>
                <div class="datetime-badge" id="datetime-display">Yükleniyor...</div>
            </div>
        </header>

        <div class="main-layout">
            <div class="dashboard">
                <div class="status-column">
                    <div class="column-header">
                        <div class="dot online-dot"></div>
                        <h2>Şu An Okulda</h2>
                    </div>
                    <div id="at-school-list" class="card-grid"></div>
                </div>

                <div class="status-column mt-gap">
                    <div class="column-header">
                        <div class="dot offline-dot"></div>
                        <h2>Okulda Olmayanlar</h2>
                    </div>
                    <div id="not-at-school-list" class="card-grid"></div>
                </div>
            </div>

            <div class="campus-wall">
                <div class="wall-header">
                    <div class="column-header" style="margin: 0;">
                        <div class="dot live-dot"></div>
                        <h2>Kampüs Duvarı</h2>
                    </div>
                    <span class="live-status">Canlı</span>
                </div>
                
                <div class="wall-messages" id="wall-messages">
                    <div class="loading-text">Duvar yükleniyor...</div>
                </div>

                <div class="wall-input-area">
                    <input type="text" id="sender-name" class="input-name" placeholder="İsminiz..." autocomplete="off">
                    <div class="input-group">
                        <input type="text" id="message-text" class="input-msg" placeholder="Durum bildir veya not yaz..." autocomplete="off" onkeypress="handleKeyPress(event)">
                        <button id="send-btn" class="send-btn" onclick="sendNote()">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Designed & Coded with 🤍 by <span class="brand">zodia3x</span></p>
        </footer>
    </div>

    <div id="schedule-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-modal" class="close-btn">&times;</button>
            <div class="modal-header">
                <h2 id="modal-name">İsim Soyisim</h2>
                <p>Haftalık Ders Programı</p>
            </div>
            
            <div class="location-update-area">
                <p class="loc-title">Hızlı Konum Bildir (1 Saat Geçerli):</p>
                <button id="loc-btn-podyum" class="loc-btn">Podyum</button>
                <button id="loc-btn-kantin" class="loc-btn">Kantin</button>
                <button id="loc-btn-ring" class="loc-btn">Ring</button>
            </div>

            <div id="modal-schedule-list" class="schedule-container"></div>
        </div>
    </div>

    <div id="notepad-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="close-notepad-btn" class="close-btn">&times;</button>
            <div class="modal-header">
                <h2 style="color: #f59e0b;">📌 Sabit Notlar</h2>
                <p style="color: #94a3b8;">Önemli duyurular (Silinmez)</p>
            </div>
            
            <div id="notepad-list" class="wall-messages" style="height: 300px; margin-bottom: 15px; background: rgba(30,41,59,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);">
                <div class="loading-text">Notlar yükleniyor...</div>
            </div>

            <div class="input-group" style="background: rgba(15, 23, 42, 0.8);">
                <input type="text" id="notepad-input" class="input-msg" placeholder="Önemli bir bilgi ekle..." autocomplete="off">
                <button id="add-notepad-btn" class="send-btn" style="background: #f59e0b;">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
